databases:
  - name: quickslot-db
    plan: free
    databaseName: quickslot
    user: quickslot_user

services:
  - type: web
    name: quickslot-api
    plan: free
    runtime: python
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py seed
    startCommand: gunicorn quickslot.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quickslot-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
